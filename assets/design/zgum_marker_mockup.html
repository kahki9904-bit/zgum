<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Z:GUM Simple Marker Mockup</title>
  <style>
    :root {
      --ink: #071426;
      --navy: #16213e;
      --cyan: #9eeeff;
      --event: #1f6f8b;
      --search: #00b4d8;
      --line: #edf0f4;
      --muted: #8f9aa3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #eef2f7;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .board {
      width: min(940px, 100%);
      margin: 0 auto;
      padding: 28px 18px 44px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 900;
    }

    .lead {
      margin: 0 0 24px;
      color: rgba(7, 20, 38, 0.62);
      font-size: 13px;
      line-height: 1.6;
    }

    .wrap {
      display: grid;
      grid-template-columns: minmax(320px, 390px) minmax(320px, 1fr);
      gap: 28px;
      align-items: start;
    }

    .phone {
      position: relative;
      width: min(390px, 100%);
      height: 790px;
      overflow: hidden;
      border-radius: 30px;
      background:
        linear-gradient(32deg, transparent 0 31%, rgba(255,255,255,0.86) 31% 34%, transparent 34% 100%),
        linear-gradient(145deg, transparent 0 43%, rgba(255,255,255,0.78) 43% 46%, transparent 46% 100%),
        linear-gradient(82deg, transparent 0 58%, rgba(255,255,255,0.70) 58% 61%, transparent 61% 100%),
        radial-gradient(ellipse at 18% 72%, #cfe7da 0 15%, transparent 16%),
        radial-gradient(ellipse at 82% 18%, #c8dee8 0 14%, transparent 15%),
        #dfe7ec;
      border: 1px solid rgba(7, 20, 38, 0.08);
      box-shadow: 0 18px 50px rgba(7, 20, 38, 0.16);
    }

    .phone::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.52), transparent 32%),
        linear-gradient(0deg, rgba(7,20,38,0.08), transparent 48%);
      pointer-events: none;
    }

    .status {
      position: absolute;
      inset: 0 0 auto 0;
      height: 42px;
      background: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0));
      z-index: 2;
    }

    .search-pill {
      position: absolute;
      top: 58px;
      left: 50%;
      width: 20px;
      height: 6px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(22, 33, 62, 0.68);
      z-index: 3;
    }

    .marker {
      position: absolute;
      z-index: 4;
      transform: translate(-50%, -100%);
    }

    .marker.user { left: 48%; top: 45%; }
    .marker.event { left: 65%; top: 33%; }
    .marker.search { left: 34%; top: 58%; }

    .dot-marker {
      width: 38px;
      height: 38px;
      border-radius: 50% 50% 50% 10px;
      border: 3px solid #fff;
      box-shadow: 0 6px 14px rgba(7,20,38,0.24);
      position: relative;
      transform: rotate(-45deg);
    }

    .user .dot-marker {
      background: #52606c;
    }

    .user .dot-marker::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.78);
    }

    .event .dot-marker {
      background: var(--event);
    }

    .event .dot-marker::before {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.86);
    }

    .search .dot-marker {
      background: #fff;
      border-color: var(--search);
    }

    .search .dot-marker::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: var(--search);
    }

    .compare {
      display: grid;
      gap: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid rgba(7,20,38,0.07);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(7,20,38,0.08);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 900;
    }

    .row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 16px;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .row:first-of-type { border-top: 0; padding-top: 0; }
    .row:last-child { padding-bottom: 0; }

    .sample {
      height: 72px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: #f6f8fb;
      position: relative;
    }

    .sample .marker {
      position: static;
      transform: none;
      margin-top: 8px;
    }

    .copy strong {
      display: block;
      font-size: 14px;
      font-weight: 900;
      color: var(--ink);
    }

    .copy span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      .wrap { grid-template-columns: 1fr; }
      .phone { height: 760px; }
    }
  </style>
</head>
<body>
  <main class="board">
    <h1>마커 시안</h1>
    <p class="lead">실제 앱 적용을 고려해서 내 위치, 이벤트, 검색을 같은 기본 핀 구조로 단순화했습니다.</p>

    <section class="wrap">
      <div class="phone">
        <div class="status"></div>
        <div class="search-pill"></div>

        <div class="marker user">
          <div class="dot-marker"></div>
        </div>

        <div class="marker event">
          <div class="dot-marker"></div>
        </div>

        <div class="marker search">
          <div class="dot-marker"></div>
        </div>
      </div>

      <div class="compare">
        <article class="card">
          <h2>세 종류 기준</h2>
          <div class="row">
            <div class="sample">
              <div class="marker user">
                <div class="dot-marker"></div>
              </div>
            </div>
            <div class="copy">
              <strong>내 위치</strong>
              <span>톤을 낮춘 회색 중심 마커입니다. 현재 위치 기준점으로만 사용합니다.</span>
            </div>
          </div>

          <div class="row">
            <div class="sample">
              <div class="marker event">
                <div class="dot-marker"></div>
              </div>
            </div>
            <div class="copy">
              <strong>이벤트</strong>
              <span>청록 중심을 살려 지도에서 이벤트가 먼저 보이도록 잡았습니다.</span>
            </div>
          </div>

          <div class="row">
            <div class="sample">
              <div class="marker search">
                <div class="dot-marker"></div>
              </div>
            </div>
            <div class="copy">
              <strong>검색</strong>
              <span>흰 바탕과 청록 테두리로 이벤트 핀과 구분합니다.</span>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
