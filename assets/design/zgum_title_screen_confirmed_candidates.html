<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Z:GUM Title Screen Mockup</title>
  <style>
    :root {
      --ink: #071426;
      --navy: #16213e;
      --cyan: #9eeeff;
      --muted: #7d8b95;
      --bg: #eef2f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .board {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 900;
    }

    .lead {
      margin: 0 0 24px;
      color: rgba(7, 20, 38, 0.62);
      font-size: 13px;
      line-height: 1.6;
    }

    .screens {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 30px;
      align-items: start;
    }

    .screen {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .label {
      width: min(390px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .label h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
    }

    .label span {
      color: rgba(7, 20, 38, 0.56);
      font-size: 12px;
    }

    .phone {
      width: min(390px, 100%);
      min-height: 790px;
      overflow: hidden;
      border-radius: 30px;
      background: #fff;
      border: 1px solid rgba(7, 20, 38, 0.08);
      box-shadow: 0 18px 50px rgba(7, 20, 38, 0.16);
      display: grid;
      place-items: center;
      padding: 38px;
    }

    .brand {
      display: grid;
      justify-items: center;
      text-align: center;
    }

    .word {
      margin: 0;
      font-size: 58px;
      line-height: 1;
      font-weight: 950;
      color: var(--ink);
      letter-spacing: 1px;
    }

    .tag {
      margin: 18px 0 0;
      width: 236px;
      color: var(--muted);
      font-size: 19px;
      font-weight: 300;
      display: flex;
      justify-content: center;
      white-space: nowrap;
      letter-spacing: 8px;
      padding-left: 8px;
    }

    .line {
      margin-top: 30px;
      width: 96px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    }

    .dark {
      background:
        radial-gradient(circle at 50% 42%, rgba(158, 238, 255, 0.18), transparent 32%),
        linear-gradient(135deg, #10213b, #071426 64%);
    }

    .dark .word {
      color: #fff;
    }

    .dark .tag {
      color: rgba(255,255,255,0.72);
    }

    .note {
      width: min(390px, 100%);
      margin: 0;
      color: rgba(7, 20, 38, 0.62);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .screens { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="board">
    <h1>Z:GUM 타이틀 화면 시안</h1>
    <p class="lead">현재 타이틀 문구는 유지하고, 확정 앱 아이콘의 네이비/화이트/하늘빛 링 느낌을 반영한 시작 화면입니다.</p>

    <section class="screens">
      <article class="screen">
        <div class="label">
          <h2>화이트 버전</h2>
          <span>기존 코드 배경 유지</span>
        </div>
        <div class="phone">
          <section class="brand">
            <div class="word">Z:GUM</div>
            <div class="tag">지금 시작하세요</div>
            <div class="line"></div>
          </section>
        </div>
        <p class="note">현재 흰 배경 타이틀 구조와 가장 가까운 버전.</p>
      </article>

      <article class="screen">
        <div class="label">
          <h2>네이비 버전</h2>
          <span>아이콘 톤 강조</span>
        </div>
        <div class="phone dark">
          <section class="brand">
            <div class="word">Z:GUM</div>
            <div class="tag">지금 시작하세요</div>
            <div class="line"></div>
          </section>
        </div>
        <p class="note">확정 아이콘과 가장 강하게 연결되는 버전.</p>
      </article>
    </section>
  </main>
</body>
</html>
