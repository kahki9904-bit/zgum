<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="920" viewBox="0 0 980 920">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/></filter>
    <filter id="sheetShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.22"/></filter>
    <linearGradient id="photo" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0a54a"/><stop offset="0.42" stop-color="#d9653b"/><stop offset="1" stop-color="#316e9f"/></linearGradient>
    <clipPath id="phoneClip"><rect x="34" y="38" width="390" height="844" rx="32"/></clipPath>
    <clipPath id="sheetClip"><rect x="54" y="198" width="350" height="523" rx="24"/></clipPath>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif; }
      .ink { fill: #333333; }
      .gold { fill: #5a452d; }
      .goldText { fill: #6d5633; }
      .mutedGold { fill: rgba(109,86,51,.6); }
      .small { font-size: 13px; }
      .note { font-size: 15px; line-height: 1.65; }
      .bold { font-weight: 800; }
    </style>
  </defs>

  <rect width="980" height="920" fill="#f5f6f8"/>

  <g filter="url(#shadow)">
    <rect x="34" y="38" width="390" height="844" rx="32" fill="#f4f6fb" stroke="#e3e3e3"/>
  </g>

  <g clip-path="url(#phoneClip)">
    <rect x="34" y="38" width="390" height="844" fill="#f4f6fb"/>
    <path d="M-20 225 L250 70" stroke="#ffffff" stroke-opacity=".82" stroke-width="18"/>
    <path d="M90 900 L460 560" stroke="#ffffff" stroke-opacity=".95" stroke-width="16"/>
    <path d="M-20 610 L430 420" stroke="#ffffff" stroke-opacity=".78" stroke-width="14"/>
    <g transform="translate(229 252) rotate(-45)">
      <path d="M23 0 C36 0 46 10 46 23 C46 36 23 58 23 58 C23 58 0 36 0 23 C0 10 10 0 23 0Z" fill="#ff8c00"/>
      <circle cx="23" cy="23" r="7" fill="#fff"/>
    </g>
    <rect x="34" y="38" width="390" height="844" fill="#000" fill-opacity=".54"/>

    <g filter="url(#sheetShadow)">
      <rect x="54" y="198" width="350" height="523" rx="24" fill="#fff"/>
    </g>

    <g clip-path="url(#sheetClip)">
      <rect x="54" y="198" width="350" height="523" fill="#fff"/>
      <rect x="74" y="210" width="310" height="58" rx="10" fill="#fff8ec" stroke="#ffd580"/>
      <path d="M92 233 h12 v16 h-12z M90 249 h16" stroke="#ff8c00" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="112" y="234" class="font ink" font-size="17" font-weight="700">
        <tspan x="112" dy="0">지금 현장에서 바로 참여 가능한</tspan>
        <tspan x="112" dy="22">이벤트를 진행 중입니다.</tspan>
      </text>

      <rect x="74" y="284" width="71" height="23" rx="8" fill="#fff2df" stroke="#ffbd73"/>
      <text x="88" y="300" class="font" font-size="11" font-weight="700" fill="#ff8c00">나의 이벤트</text>

      <rect x="74" y="317" width="310" height="180" rx="12" fill="url(#photo)"/>
      <circle cx="316" cy="357" r="24" fill="#fff" opacity=".6"/>
      <path d="M52 475 C150 420 270 455 410 413 L410 528 L52 528Z" fill="#fff" opacity=".3"/>
      <rect x="326" y="325" width="50" height="24" rx="12" fill="#000" fill-opacity=".54"/>
      <text x="341" y="342" class="font" font-size="12" font-weight="600" fill="#fff">+2</text>

      <text x="74" y="527" class="font ink" font-size="14">
        <tspan x="74" dy="0">매장 앞 작은 팝업 이벤트입니다. 근처에 있다면</tspan>
        <tspan x="74" dy="24">지금 바로 들러서 참여할 수 있어요.</tspan>
      </text>

      <text x="74" y="588" class="font" font-size="13" fill="#9b8a70">
        <tspan x="74" dy="0">부산광역시 해운대구 센텀중앙로 00</tspan>
      </text>
      <rect x="337" y="568" width="47" height="27" rx="8" fill="#5a452d"/>
      <text x="345" y="586" class="font" font-size="12" font-weight="600" fill="#fff">길찾기</text>

      <text x="74" y="626" class="font" font-size="15" fill="#8c8c8c">◷</text>
      <text x="98" y="626" class="font" font-size="13" fill="#9b8a70">6/29 14:00 ~ 6/29 18:00</text>
      <text x="74" y="656" class="font" font-size="15" fill="#e74c3c">⌕</text>
      <text x="98" y="656" class="font" font-size="13" font-weight="700" fill="#e74c3c">연령 확인 이벤트</text>

      <rect x="74" y="604" width="310" height="36" rx="12" fill="#fffdf8" stroke="#d9bd7a"/>
      <text x="183" y="627" class="font" font-size="13" font-weight="800" fill="#6d5633">의견 보내기</text>

      <rect x="131" y="653" width="195" height="52" rx="16" fill="#5a452d"/>
      <text x="214" y="686" class="font" font-size="17" font-weight="600" letter-spacing="2" fill="#fff">지금</text>
    </g>
  </g>

  <text x="488" y="262" class="font goldText" font-size="26" font-weight="800">
    <tspan x="488" dy="0">이벤트 상세페이지</tspan>
    <tspan x="488" dy="34">코드기준 시안</tspan>
  </text>
  <text x="488" y="352" class="font" font-size="15" fill="#555">
    <tspan x="488" dy="0">현재 구현된 상세 팝업 구조를 기준으로 만든 시안입니다.</tspan>
    <tspan x="488" dy="26">상세페이지 자체 구조는 유지하고, 하단 정보 영역에</tspan>
    <tspan x="488" dy="26">의견 보내기 항목만 추가하는 방향입니다.</tspan>
  </text>
  <text x="488" y="458" class="font" font-size="15" fill="#555">
    <tspan x="488" dy="0">실제 앱 코드 변경용이 아니라 클로드에게 전달할</tspan>
    <tspan x="488" dy="26">화면 기준 이미지입니다.</tspan>
  </text>
  <rect x="488" y="530" width="420" height="136" rx="14" fill="#fffdf8" stroke="#e6e0d4"/>
  <text x="508" y="563" class="font" font-size="13" font-weight="700" fill="#6d5633">
    <tspan x="508" dy="0">화면 기준: 390 x 844</tspan>
    <tspan x="508" dy="28">팝업 기준: 좌우 20px 여백, 높이 0.62배 약 523px</tspan>
    <tspan x="508" dy="28">팝업 형태: 중앙 정렬, 흰 배경, 24px 라운드</tspan>
    <tspan x="508" dy="28">추가 항목: 신고 대신 부드러운 표현의 의견 보내기</tspan>
  </text>
</svg>
