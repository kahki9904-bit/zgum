<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Z:GUM — 탐험을 시작하세요">
  <title>Z:GUM</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <!--
  ┌─────────────────────────────────────────────────────────────┐
  │  KAKAO MAPS  ·  API KEY CONFIGURATION                       │
  │                                                             │
  │  [WEB]    JS Key  →  아래 <script src> appkey 파라미터      │
  │           f92c6befd96a3010aad40698f4bfd43e                  │
  │                                                             │
  │  [MOBILE] Native App Key  →  lib/main.dart                  │
  │           433d2724092434b5642227386bcd2f13                  │
  └─────────────────────────────────────────────────────────────┘
  -->
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f92c6befd96a3010aad40698f4bfd43e">
  </script>

  <style>
    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1e;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
                   'Pretendard', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 지도 (전체 화면 배경, 앱 시작 즉시 렌더링) ────────── */
    #map {
      position: absolute;
      inset: 0;
    }

    /* ── 브랜드 블록 — 화면 정중앙 ───────────────────────────
       top 50% + translateY(-50%) → 수직 중앙
       left 50% + translateX(-50%) → 수평 중앙               */
    #brand {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      display: flex;
      flex-direction: column;
      align-items: center;  /* 자식 요소 수평 중앙 */
      gap: 0;

      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 0, 139, 0.08);
      border-radius: 32px;
      padding: 32px 48px 28px;
      box-shadow:
        0 1px 4px rgba(0, 0, 0, 0.06),
        0 8px 36px rgba(0, 0, 139, 0.13);

      pointer-events: none;   /* 지도 터치 방해 방지 */
      user-select: none;
      z-index: 200;
      white-space: nowrap;

      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* 브랜드 블록 — 탐험 시작 후 상단으로 축소 */
    #brand.minimized {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 26px 9px;
      border-radius: 28px;
      gap: 3px;
    }

    /* Z:GUM 로고 */
    #brand-name {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 12px;
      padding-left: 12px;   /* letter-spacing 우측 여백 보정 */
      color: #00008B;
      line-height: 1;
      transition: font-size 0.4s ease, letter-spacing 0.4s ease;
    }
    #brand.minimized #brand-name {
      font-size: 13px;
      letter-spacing: 7px;
      padding-left: 7px;
    }

    /* 구분선 */
    #brand-divider {
      width: 28px;
      height: 1px;
      background: rgba(0, 0, 139, 0.18);
      margin: 14px 0 12px;
      transition: opacity 0.3s ease, margin 0.4s ease;
    }
    #brand.minimized #brand-divider {
      margin: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* 슬로건 — 절대 변경 금지 */
    #brand-slogan {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 1px;
      color: rgba(0, 0, 139, 0.55);
      line-height: 1;
      transition: font-size 0.4s ease, opacity 0.3s ease;
    }
    #brand.minimized #brand-slogan {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(0, 0, 139, 0.45);
    }

    /* 탐험 시작 버튼 */
    #start-btn {
      margin-top: 22px;
      padding: 13px 32px;
      border: none;
      border-radius: 22px;
      background: #00008B;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      pointer-events: auto;    /* 브랜드 블록 pointer-events:none 재정의 */
      transition: background 0.2s ease, transform 0.12s ease, opacity 0.3s ease;
    }
    #start-btn:hover   { background: #0000a8; }
    #start-btn:active  { transform: scale(0.96); }
    #start-btn:disabled {
      background: rgba(0, 0, 139, 0.35);
      cursor: default;
      transform: none;
    }
    #brand.minimized #start-btn {
      display: none;
    }

    /* ── 위치 상태 토스트 — 하단 중앙 ────────────────────────
       left 50% + translateX(-50%) → 수평 중앙               */
    #status {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);

      display: flex;
      align-items: center;
      gap: 8px;

      background: rgba(12, 12, 20, 0.86);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 11px 20px;

      color: rgba(255, 255, 255, 0.90);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.2px;
      line-height: 1;
      white-space: nowrap;

      z-index: 200;
      opacity: 0;           /* 버튼 클릭 전까지 숨김 */
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    #status.visible { opacity: 1; pointer-events: auto; }
    #status.hidden  { opacity: 0; pointer-events: none; }

    /* 상태 점 */
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #64B5F6;
      transition: background 0.4s ease;
    }
    #status-dot.acquiring { animation: dot-blink 1.4s ease-in-out infinite; }
    #status-dot.found     { background: #4CAF50; animation: none; }
    #status-dot.error     { background: #EF5350; animation: none; }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── 현재 위치 커서 ────────────────────────────────────── */
    .loc-cursor {
      width: 56px; height: 56px;
      position: relative;
      pointer-events: none;
      will-change: transform;
    }

    .loc-cursor .pulse {
      position: absolute;
      top: 50%; left: 50%;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(21, 101, 192, 0.16);
      transform: translate(-50%, -50%) scale(0.15);
      opacity: 0;
      will-change: transform, opacity;
    }
    .loc-cursor .pulse-1 { animation: loc-pulse 2.4s cubic-bezier(0.4,0,0.6,1) infinite; }
    .loc-cursor .pulse-2 { animation: loc-pulse 2.4s cubic-bezier(0.4,0,0.6,1) 1.2s infinite; }

    .loc-cursor .dot {
      position: absolute;
      top: 50%; left: 50%;
      width: 17px; height: 17px;
      border-radius: 50%;
      background: #1565C0;
      border: 3px solid #ffffff;
      transform: translate(-50%, -50%) translateZ(0);
      box-shadow:
        0 2px 8px rgba(21, 101, 192, 0.50),
        0 0 0 1px rgba(21, 101, 192, 0.20);
    }

    @keyframes loc-pulse {
      0%   { transform: translate(-50%, -50%) scale(0.15); opacity: 0; }
      10%  { opacity: 0.85; }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- 브랜드 블록 (화면 정중앙, 탐험 시작 후 상단 칩으로 전환) -->
  <div id="brand">
    <span id="brand-name">Z:GUM</span>
    <div id="brand-divider"></div>
    <span id="brand-slogan">탐험을 시작하세요</span>
    <button id="start-btn" onclick="onStartExplore()">탐험 시작</button>
  </div>

  <!-- 지도 -->
  <div id="map"></div>

  <!-- 위치 상태 토스트 (버튼 클릭 전 숨김) -->
  <div id="status">
    <div id="status-dot" class="acquiring"></div>
    <span id="status-text">위치 확인 중...</span>
  </div>

  <script>
    'use strict';

    // ── 상수 ────────────────────────────────────────────────────────
    const FALLBACK_LAT = 37.5665;   // 서울 시청 (위치 권한 거부 시 폴백)
    const FALLBACK_LNG = 126.9780;
    const LV_DEFAULT   = 5;         // 기본 줌 레벨 (카카오맵: 낮을수록 확대)
    const LV_USER      = 4;         // 실제 위치 획득 후 줌 레벨

    // ── 카카오맵 초기화 (앱 실행 즉시 지도만 렌더링, 위치 요청 없음) ──
    const map = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(FALLBACK_LAT, FALLBACK_LNG),
      level:  LV_DEFAULT,
    });

    // ── 위치 커서 오버레이 ────────────────────────────────────────────
    let cursorOverlay = null;

    function buildCursorEl() {
      const el = document.createElement('div');
      el.className = 'loc-cursor';
      el.innerHTML =
        '<div class="pulse pulse-1"></div>' +
        '<div class="pulse pulse-2"></div>' +
        '<div class="dot"></div>';
      return el;
    }

    function placeCursor(lat, lng) {
      const pos = new kakao.maps.LatLng(lat, lng);
      if (cursorOverlay) {
        cursorOverlay.setPosition(pos);
        return;
      }
      cursorOverlay = new kakao.maps.CustomOverlay({
        position: pos,
        content:  buildCursorEl(),
        xAnchor:  0.5,
        yAnchor:  0.5,
        zIndex:   10,
      });
      cursorOverlay.setMap(map);
    }

    // ── 상태 토스트 ──────────────────────────────────────────────────
    const statusEl   = document.getElementById('status');
    const statusDot  = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    let   hideTimer  = null;

    function setStatus(type, msg, autohideMs = 0) {
      clearTimeout(hideTimer);
      statusDot.className = type;
      statusText.textContent = msg;
      statusEl.classList.add('visible');
      statusEl.classList.remove('hidden');

      if (autohideMs > 0) {
        hideTimer = setTimeout(() => {
          statusEl.classList.remove('visible');
          statusEl.classList.add('hidden');
        }, autohideMs);
      }
    }

    // ── Geolocation 콜백 ─────────────────────────────────────────────
    let watchId    = null;
    let isFirstFix = true;

    function onPosition(pos) {
      const { latitude: lat, longitude: lng } = pos.coords;

      if (isFirstFix) {
        isFirstFix = false;
        map.setCenter(new kakao.maps.LatLng(lat, lng));
        map.setLevel(LV_USER);
        setStatus('found', '현재 위치', 2200);
      }

      placeCursor(lat, lng);
    }

    function onError(err) {
      // 버튼 재활성화 (재시도 가능)
      const btn = document.getElementById('start-btn');
      btn.disabled = false;
      btn.textContent = '다시 시도';

      placeCursor(FALLBACK_LAT, FALLBACK_LNG);

      const msg = err.code === err.PERMISSION_DENIED
        ? '위치 권한이 없어 서울 시청 기준으로 표시합니다'
        : '위치를 가져올 수 없어 서울 시청 기준으로 표시합니다';

      setStatus('error', msg, 4500);
    }

    // ── 탐험 시작 버튼 핸들러 ─────────────────────────────────────────
    // 위치 확인은 이 함수가 호출될 때만 시작됩니다.
    // (앱 실행 직후 자동 실행 없음)
    function onStartExplore() {
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = '확인 중...';

      // 브랜드 블록: 중앙 → 상단 칩으로 애니메이션
      document.getElementById('brand').classList.add('minimized');

      setStatus('acquiring', '위치 확인 중...');

      if (!navigator.geolocation) {
        placeCursor(FALLBACK_LAT, FALLBACK_LNG);
        setStatus('error', '이 브라우저는 위치 서비스를 지원하지 않습니다', 5000);
        return;
      }

      // watchPosition: 실시간 위치 추적
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(
        onPosition,
        onError,
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 3000 }
      );
    }

    // 페이지 이탈 시 위치 감시 정리
    window.addEventListener('beforeunload', () => {
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    });
  </script>

</body>
</html>
