name: zgum
description: Z:GUM (NOW) — 지금, 주변의 문화 행사를 발견하세요.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # 지도 — OpenStreetMap (FlutterMapEngine 폴백용으로 유지)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # 지도 — 카카오 (네이티브 SDK, 네이티브 앱 키 + 키 해시 필요)
  kakao_map_sdk: ^1.2.2

  # 위치
  geolocator: ^11.0.0
  permission_handler: ^11.3.1

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 네트워크 (추후 공공데이터포털 API 연동)
  dio: ^5.4.3+1

  # 유틸
  equatable: ^2.0.5

  # 체크인 기록 — 로컬 저장 (추후 클라우드 전환 시 Repository 구현체만 교체)
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # 사진 — 카메라/갤러리 (추후 firebase_storage 등으로 업로드 레이어 추가)
  image_picker: ^1.1.2

  # 기기 인증 — 지문/얼굴/PIN/패턴 (앱 진입 시 잠금)
  local_auth: ^2.3.0

  # 로컬 알림 — 사용자가 지정한 이벤트에만 알림 예약 (추후 FCM 푸시로 확장 가능)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  google_fonts: ^6.2.1

  # 외부 링크 열기
  url_launcher: ^6.3.0

  # 앱 버전 정보
  package_info_plus: ^8.0.0

  # 제목 전광판 효과
  marquee: ^2.2.3

  # 흔들기 감지
  sensors_plus: ^6.1.0

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
